<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitFi</title>

    <!-- Tailwind fallback: alleen in DEV en pas NA module-CSS injectie -->
    <script type="module">
      const wait = () => new Promise(r => setTimeout(r, 0));
      (async () => {
        if (!import.meta.env.DEV) return;   // ✅ nooit in productie
        // wacht 2 frames zodat Vite de CSS kan injecteren
        await wait(); await wait();
        const probe = document.createElement('div');
        probe.className = 'hidden';
        document.documentElement.appendChild(probe);
        const active = getComputedStyle(probe).display === 'none';
        probe.remove();
        if (!active) {
          const cfg = document.createElement('script');
          cfg.innerHTML = `
            window.tailwind = window.tailwind || {};
            window.tailwind.config = {
              theme: { extend: { colors: { brandPurple: '#6E59A5' } } },
              safelist: [
                'text-brandPurple','border-brandPurple','ring-brandPurple','focus:ring-brandPurple/40'
              ]
            };
          `;
          const cdn = document.createElement('script');
          cdn.src = 'https://cdn.tailwindcss.com';
          document.head.appendChild(cfg);
          document.head.appendChild(cdn);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
