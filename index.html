<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitFi</title>

    <!-- Tailwind runtime fallback: laadt CDN als de bundel/Preflight niet actief is -->
    <script>
      (function(){
        try {
          // 1) Test of een basis-utility werkt
          var probe = document.createElement('div');
          probe.className = 'hidden';
          document.documentElement.appendChild(probe);
          var active = getComputedStyle(probe).display === 'none';
          probe.remove();

          if (!active) {
            // 2) Configureer onze merk-kleur vóór het laden van de CDN
            var cfg = document.createElement('script');
            cfg.innerHTML = "window.tailwind=window.tailwind||{};window.tailwind.config={theme:{extend:{colors:{brandPurple:'#6E59A5'}}},safelist:['text-brandPurple','border-brandPurple','ring-brandPurple','focus:ring-brandPurple/40']};";

            // 3) Laad Tailwind CDN
            var cdn = document.createElement('script');
            cdn.src = 'https://cdn.tailwindcss.com';

            document.head.appendChild(cfg);
            document.head.appendChild(cdn);
          }
        } catch(_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
