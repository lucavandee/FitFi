[build]
  # Installeer en build alleen binnen /frontend
  command = "npm install --prefix frontend && npm run --prefix frontend build"
  publish = "frontend/dist"

[functions]
  # Functions-map op repo-root
  directory = "netlify-functions"
  node_bundler = "esbuild"

## Alleen SPA fallback (de /.netlify redirect is verwijderd; die veroorzaakte jouw parse warning)
[[redirects]]
  from = "/*"
  to     = "/index.html"
  status = 200