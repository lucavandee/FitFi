[build]
  # Installeer en build alleen binnen /frontend
  command = "npm ci --prefix frontend && npm run --prefix frontend build"
  publish = "frontend/dist"

[functions]
  # Functions-map op repo-root
  directory = "netlify-functions"
  node_bundler = "esbuild"

## Laat function-calls gewoon door (nodig voor dev/preview en SPA)
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

## SPA fallback voor Vite/React routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200