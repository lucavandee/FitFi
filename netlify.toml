# Netlify config — minimal & parse-safe

[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20.19.0"

# If you use Netlify Functions in /netlify/functions (TypeScript/JS), keep this:
[functions]
directory = "netlify/functions"

# Optional: set the production context explicitly (mirrors defaults)
[context.production.environment]
NODE_VERSION = "20.19.0"